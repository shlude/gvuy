<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>博客建设步骤 - ZZCD</title>
    <script src="marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2b5876);
            color: #f5f5f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* 顶部导航 */
        .nav {
            max-width: 860px;
            margin: 0 auto 30px;
        }

        .nav a {
            color: #00c6ff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav a:hover {
            opacity: 1;
        }

        /* 主卡片 */
        .card {
            max-width: 860px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px 56px;
            backdrop-filter: blur(10px);
        }

        /* Markdown 内容样式 */
        #md-content h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 198, 255, 0.3);
        }

        #md-content h1:first-child {
            margin-top: 0;
        }

        #md-content h2 {
            font-size: 22px;
            color: #e0e0e0;
            margin-top: 32px;
            margin-bottom: 14px;
        }

        #md-content h3 {
            font-size: 17px;
            color: #00c6ff;
            margin-top: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        #md-content p {
            font-size: 15px;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 14px;
        }

        #md-content strong {
            color: #fff;
        }

        /* 代码块 */
        #md-content pre {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 18px 22px;
            margin: 14px 0 20px;
            overflow-x: auto;
        }

        #md-content pre code {
            font-family: "Fira Code", "Cascadia Code", "Source Code Pro", monospace;
            font-size: 13.5px;
            color: #7dd3fc;
            background: none;
            padding: 0;
            line-height: 1.7;
        }

        /* 行内代码 */
        #md-content code {
            background: rgba(0, 198, 255, 0.12);
            color: #7dd3fc;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 13px;
            font-family: "Fira Code", monospace;
        }

        /* 注释行（# 开头的注释） */
        #md-content pre code .comment {
            color: #6b8a9e;
        }

        /* 列表 */
        #md-content ul, #md-content ol {
            padding-left: 22px;
            margin-bottom: 14px;
        }

        #md-content li {
            font-size: 15px;
            color: #ccc;
            line-height: 1.8;
            margin-bottom: 4px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            color: #aaa;
            padding: 60px 0;
            font-size: 15px;
        }

        /* 小屏适配 */
        @media (max-width: 640px) {
            .card {
                padding: 28px 22px;
            }

            #md-content h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html">← 返回首页</a>
</div>

<div class="card">
    <div id="md-content">
        <div class="loading">加载中…</div>
    </div>
</div>

<script>
    fetch('web_build.md')
        .then(res => {
            if (!res.ok) throw new Error('文件加载失败');
            return res.text();
        })
        .then(text => {
            document.getElementById('md-content').innerHTML = marked.parse(text);
        })
        .catch(err => {
            document.getElementById('md-content').innerHTML =
                '<p style="color:#f87171">⚠️ 无法加载 web_build.md，请确保文件在同一目录下。</p>';
        });
</script>

</body>
</html>
